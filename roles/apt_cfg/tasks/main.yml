---
- name: Install apt-transport-https 
  ansible.builtin.apt:
    name: apt-transport-https
    state: present

- name: Debian Haupt-Repositories (Main, Updates, Backports)
  deb822_repository:
    name: debian
    types: [deb]
    uris: "https://deb.debian.org/debian"
    suites: 
      - "{{ ansible_distribution_release }}"
      - "{{ ansible_distribution_release }}-updates"
      - "{{ ansible_distribution_release }}-backports"
    components: ["main", "contrib", "{{ (ansible_distribution_major_version | int >= 12) | ternary('non-free-firmware', 'non-free') }}"]
    signed_by: /usr/share/keyrings/debian-archive-keyring.gpg

- name: Debian Security Repositories
  deb822_repository:
    name: debian-security
    types: [deb]
    # Wichtig: Die URL für Security ist anders!
    uris: "https://deb.debian.org/debian-security"
    # Das Schema für Security-Suites ab Debian 11
    suites: "{{ ansible_distribution_release }}-security"
    components: ["main", "contrib", "{{ (ansible_distribution_major_version | int >= 12) | ternary('non-free-firmware', 'non-free') }}"]
    signed_by: /usr/share/keyrings/debian-archive-keyring.gpg

- name: Remove Old and Ugly default apt sources.list
  ansible.builtin.file:
    dest: /etc/apt/sources.list
    state: absent    

- name: Update apt cache
  ansible.builtin.apt:
    name: "*"
    update_cache: yes

- name: apt install unattended-upgrades,needrestart
  ansible.builtin.apt:
    name: 
      - unattended-upgrades
    state: present

- name: Configure unattended-upgrades
  ansible.builtin.template:
    src: 50unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: '0644'

- name: Enable unattended-upgrades
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/20auto-upgrades
    line: 'APT::Periodic::Unattended-Upgrade "1";'
    create: yes
